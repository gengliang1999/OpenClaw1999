<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      cursor: crosshair;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    .floating-toolbar {
      position: absolute;
      z-index: 9999;
      background: rgba(15, 15, 27, 0.88);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(162, 89, 255, 0.4);
      border-radius: 12px;
      padding: 6px 10px;
      display: flex;
      gap: 4px;
      align-items: center;
      box-shadow: 0 12px 32px rgba(97, 0, 255, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.05);
      transform: scale(0.9);
      opacity: 0;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.25), opacity 0.2s;
      pointer-events: auto;
    }
    .floating-toolbar.show {
      transform: scale(1);
      opacity: 1;
    }
    .tool-btn {
      background: transparent;
      border: none;
      color: #e2e2e9;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.2s, color 0.2s;
    }
    .tool-btn:hover {
      background: rgba(162, 89, 255, 0.2);
      color: #ffffff;
    }
    .tool-btn.danger:hover {
      background: rgba(255, 59, 48, 0.15);
      color: #ff453a;
    }
    .divider {
      width: 1px;
      height: 14px;
      background: rgba(255, 255, 255, 0.15);
      margin: 0 4px;
    }
  </style>
</head>
<body>
  <canvas id="screenshotCanvas"></canvas>
  
  <!-- 截图划选后的浮动操作气泡栏 -->
  <div id="floatingToolbar" class="floating-toolbar" style="display: none;">
    <button class="tool-btn" id="btnExplain">🔍 AI解释</button>
    <button class="tool-btn" id="btnTranslate">🌐 AI翻译</button>
    <button class="tool-btn" id="btnOcr">📝 提取文字</button>
    <button class="tool-btn" id="btnSend">✅ 插入对话</button>
    <div class="divider"></div>
    <button class="tool-btn danger" id="btnCancel">✕</button>
  </div>

  <script src="screenshot.js"></script>
</body>
</html>
